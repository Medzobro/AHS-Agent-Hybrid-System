<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AHS Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;display:flex;flex-direction:column}
header{background:#161b22;padding:1rem 2rem;border-bottom:1px solid #30363d}
h1{color:#58a6ff;font-size:1.5rem}
.container{max-width:800px;margin:2rem auto;padding:0 1rem;flex:1}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:1.5rem;margin-bottom:1rem}
.card h2{color:#58a6ff;margin-bottom:1rem;font-size:1.1rem}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem}
.stat{text-align:center;padding:1rem;background:#0d1117;border-radius:6px}
.stat-value{font-size:2rem;font-weight:700;color:#58a6ff}
.stat-label{font-size:.8rem;color:#8b949e;margin-top:.3rem}
textarea{width:100%;padding:.75rem;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:.95rem;min-height:100px;resize:vertical;font-family:inherit}
select{background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:.5rem;border-radius:6px;margin:.5rem 0}
.btn{background:#238636;color:#fff;border:none;padding:.75rem 1.5rem;border-radius:6px;font-size:1rem;cursor:pointer;transition:.2s}
.btn:hover{background:#2ea043}
.btn:disabled{opacity:.5;cursor:not-allowed}
#result{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:1rem;margin-top:1rem;white-space:pre-wrap;font-family:monospace;font-size:.85rem;display:none}
.loading{text-align:center;padding:2rem;color:#8b949e}
.error{color:#f85149}
footer{text-align:center;padding:1rem;color:#8b949e;font-size:.8rem}
</style>
</head>
<body>
<header><h1>🤝 AHS Dashboard v1.0</h1></header>
<div class="container">

  <!-- Stats -->
  <div class="card">
    <h2>📊 حالة النظام</h2>
    <div class="grid" id="stats">
      <div class="stat"><div class="stat-value">...</div><div class="stat-label">Uptime</div></div>
      <div class="stat"><div class="stat-value">...</div><div class="stat-label">طلبات</div></div>
      <div class="stat"><div class="stat-value">v1.0</div><div class="stat-label">الإصدار</div></div>
      <div class="stat"><div id="status-badge" class="stat-value">🔴</div><div class="stat-label">الحالة</div></div>
    </div>
  </div>

  <!-- Task Submission -->
  <div class="card">
    <h2>🚀 إرسال مهمة</h2>
    <textarea id="task-input" placeholder="اكتب مهمتك هنا..."></textarea>
    <div>
      <select id="mode-select">
        <option value="hybrid">Hybrid</option>
        <option value="quick">Quick</option>
      </select>
      <button class="btn" id="send-btn" onclick="sendTask()">إرسال</button>
    </div>
    <div id="result"></div>
  </div>

</div>
<footer>AHS-Agent-Hybrid-System · <a href="/health" style="color:#58a6ff">/health</a> · <a href="/metrics" style="color:#58a6ff">/metrics</a></footer>

<script>
const API = window.location.origin;

async function loadStats() {
  try {
    const r = await fetch(API + '/health');
    const data = await r.json();
    document.querySelector('#stats .stat:nth-child(1) .stat-value').textContent = data.uptime + 's';
    document.querySelector('#stats .stat:nth-child(2) .stat-value').textContent = data.requests;
    const badge = document.querySelector('#status-badge');
    badge.textContent = data.status === 'ok' ? '🟢' : '🔴';
    badge.style.color = data.status === 'ok' ? '#3fb950' : '#f85149';
  } catch(e) {
    document.querySelector('#status-badge').textContent = '🔴';
  }
}

async function sendTask() {
  const task = document.getElementById('task-input').value.trim();
  const mode = document.getElementById('mode-select').value;
  if (!task) return;

  const btn = document.getElementById('send-btn');
  const result = document.getElementById('result');
  result.style.display = 'block';
  result.innerHTML = '<div class="loading">⏳ جاري المعالجة...</div>';
  btn.disabled = true;

  try {
    const r = await fetch(API + '/task', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({task, mode, timeout: 60}),
    });
    const data = await r.json();
    result.innerHTML = data.response ? `<div>${data.response}</div>` : `<div class="error">${JSON.stringify(data)}</div>`;
  } catch(e) {
    result.innerHTML = `<div class="error">❌ ${e.message}</div>`;
  }
  btn.disabled = false;
  loadStats();
}

loadStats();
setInterval(loadStats, 10000);
</script>
</body>
</html>
