services:
  ahs-server:
    build: .
    image: ahs:1.0.0
    container_name: ahs-mcp
    ports:
      - "18900:18900"
    environment:
      - AHS_MCP_PORT=18900
      - AHS_MCP_HOST=0.0.0.0
      - AHS_VERSION=1.0.0
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18900/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
