name: AHS CI v1.0

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - run: pip install ruff
      - run: ruff check --output-format=github .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - run: pip install aiohttp httpx pytest pytest-cov ruff
      - name: Run tests with server
        run: |
          python3 bridge/mcp_http_server.py &
          SERVER_PID=$!
          sleep 3
          python3 -m pytest tests/test_suite.py -v --tb=short -k "not timeout" --cov=bridge --cov=system
          kill $SERVER_PID 2>/dev/null || true

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install aiohttp
      - name: Python syntax check
        run: |
          python3 -m py_compile bridge/mcp_http_server.py
          python3 -m py_compile bridge/hermes_bridge.py
          python3 -m py_compile system/__init__.py
          python3 -m py_compile system/integration.py

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build --tag ahs:ci .
